<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
	<link rel="icon" href="/favicon/favicon.ico" />

	<title>Home | Tripnaught</title>

	<link rel="stylesheet" href="/css/perfect-fourth.css" type="text/css">
	<link rel="stylesheet" href="css/styles.css" type="text/css">

	<script src="/js/generate-nav.js"></script>
	<script src="/js/friend-groups.js"></script>


</head>

<body>
	<div id="nav"></div>

	<div id="content">
		<h1 class="display-lg"><mark>friend groups</mark></h1>
		<hr />
		
		<h2><mark>settings</mark></h2>
		<div>
			<label for="num-groups">Number of Groups:</label>
			<input type="number" id="num-groups" value="11" min="1">
			<br>
			<label for="display-friends">Display Friend Lists in Final Groups:</label>
			<input type="checkbox" id="display-friends">
			<br>
			<label for="boy-token">Boy Token:</label>
			<input type="text" id="boy-token" value="^" maxlength="1">
			<br>
			<label for="girl-token">Girl Token:</label>
			<input type="text" id="girl-token" value="+" maxlength="1">
			<br>
			<label for="num-runs">Number of Optimization Runs:</label>
			<input type="number" id="num-runs" value="100" min="1">
			<br>
			<label for="rng-seed">RNG Seed:</label>
			<input type="number" id="rng-seed" value="67">
		</div>
		<br>
		<hr />
		
		<form action="/your-upload-script" method="post" enctype="multipart/form-data">
			<label for="csv-file-upload">Choose a CSV to upload:&nbsp;</label>
			<input type="file" id="csv-file-upload" name="filename" accept="application/csv" />
			<input type="submit" value="Create Groups!" />
		</form>

		<br />

		<div id="output" style="background-color: #ffffff20; padding:10px; height: 70vh; overflow-y: scroll;">

		</div>

	</div>
</body>

</html>
